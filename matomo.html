<script type="text/javascript" src="https://www.termsfeed.com/public/cookie-consent/4.2.0/cookie-consent.js" charset="UTF-8"></script>
<script type="text/javascript">
document.addEventListener('DOMContentLoaded', function () {
  cookieconsent.run({
    "notice_banner_type": "simple",
    "consent_type": "express",
    "notice_banner_purposes_levels": ["tracking"],
    "palette": "light",
    "language": "en",
    "page_load_consent_levels": ["strictly-necessary"],
    "notice_banner_reject_button_hide": false,
    "preferences_center_close_button_hide": false,
    "page_refresh_confirmation_buttons": false,
    "website_name": "De.KCD - Cloud For Data Management - Repository of data-management platforms",
    "website_privacy_policy_url": "https://dekcd.github.io/FAIR-DMP-Registry/pages/privacy.html",
    "callbacks": {
      "consent_given": function(consent) {
        if (consent.tracking) {
          loadMatomo();
        }
      },
      "consent_loaded": function(consent) {
        // Fires on page load if consent was already given previously
        if (consent.tracking) {
          loadMatomo();
        }
      }
    }
  });
});

function loadMatomo() {
  // Guard against double-loading
  if (window._matomoLoaded) return;
  window._matomoLoaded = true;

  var _paq = window._paq = window._paq || [];
  _paq.push(['setVisitorCookieTimeout', '2592000']);
  _paq.push(['setSessionCookieTimeout', '0']);
  _paq.push(["setDomains", ["*.dekcd.github.io/FAIR-DMP-Registry"]]);
  _paq.push(["setCookieDomain", "*.dekcd.github.io"]);
  _paq.push(['trackPageView']);
  _paq.push(['enableLinkTracking']);
  _paq.push(['enableHeartBeatTimer', 15]);

  (function() {
    var u = "https://piwik.cebitec.uni-bielefeld.de/";
    _paq.push(['setTrackerUrl', u + 'matomo.php']);
    _paq.push(['setSiteId', '39']);
    var d = document, g = d.createElement('script'), s = d.getElementsByTagName('script')[0];
    g.async = true;
    g.src = u + 'matomo.js';
    s.parentNode.insertBefore(g, s);
  })();
}
</script>
